<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recobook - Add Book</title>
    <link rel="stylesheet" href="admin-add.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <div class="logo-text">Recobook</div>
        </div>

        <div class="nav-right">
            <div class="logo-badge">
                <img src="https://cdn-icons-png.flaticon.com/512/2232/2232688.png" alt="icon" width="20">
                <span>Recobook</span>
            </div>
        </div>
    </header>

    <main class="admin-container">
        <div class="admin-header-row">
            <h1 class="admin-title">Admin</h1>
            <div class="page-indicator">Add Book</div>
        </div>

        <div class="add-book-card">
            <form id="addBookForm">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" required>
                </div>

                <div class="form-group">
                    <label for="genre">Genre</label>
                    <input type="text" id="genre" required>
                </div>

                <div class="form-group">
                    <label for="author">Author</label>
                    <input type="text" id="author" required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="5" required></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-white add-submit-btn">Add</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('addBookForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Book details sent to backend to generate AI embeddings!');
            window.location.href = 'admin.html';
        });
    </script>
</body>
</html>
