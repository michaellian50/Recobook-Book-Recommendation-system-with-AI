<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recobook - Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <div class="logo-text">Recobook Admin</div>
        </div>

        <div class="nav-right">
            <div class="logo-badge">
                <img src="https://cdn-icons-png.flaticon.com/512/2232/2232688.png" alt="icon" width="20">
                <span>Recobook</span>
            </div>
            <a href="/" style="margin-left: 20px; color: #666; text-decoration: none; font-size: 0.9rem;">View Site</a>
        </div>
    </header>

    <main class="admin-container">
        <div class="admin-controls">
            <div class="controls-left">
                <h1 class="admin-title">Book Management</h1>
                <div class="admin-search-box">
                    <input type="text" placeholder="Search book ID or Title..." id="adminSearch" onkeyup="filterBooks()">
                </div>
            </div>
            
            <div class="controls-right">
                <button class="btn-dark" onclick="openModal()">+ Add Book</button>
            </div>
        </div>

        <div class="admin-list" id="adminList">
            {% if books %}
                {% for book in books %}
                <div class="admin-book-item" data-title="{{ book.title.lower() }}">
                    <div class="book-info">
                        <span class="book-id">#{{ book.book_id }}</span>
                        <h3 class="admin-book-title">{{ book.title }}</h3>
                        <p class="admin-book-author">{{ book.authors }}</p>
                    </div>
                    <div class="admin-actions">
                        <button class="btn-white" 
                                data-id="{{ book.book_id }}"
                                data-title="{{ book.title|replace('"', '&quot;') }}"
                                data-authors="{{ book.authors|replace('"', '&quot;') }}"
                                data-genres="{{ book.genres|replace('"', '&quot;') }}"
                                onclick="prepareEdit(this)">
                            Edit
                        </button>
                        <button class="btn-white del-btn" onclick="deleteBook('{{ book.book_id }}')" style="color: red;">Delete</button>
                    </div>
                </div>
                {% endfor %}
            {% else %}
                <p>No books found in the database.</p>
            {% endif %}
        </div>
    </main>

    <div id="bookModal" class="modal" style="display:none; position: fixed; z-index: 1001; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center;">
        <div class="modal-content" style="background: white; padding: 30px; border-radius: 15px; width: 500px; max-width: 90%; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
            <h2 id="modalTitle" style="margin-bottom: 20px;">Add New Book</h2>
            <form id="adminBookForm">
                <input type="hidden" id="form_book_id">
                <div style="margin-bottom: 15px;">
                    <label>Title</label><br>
                    <input type="text" id="form_title" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ddd;" required>
                </div>
                <div style="margin-bottom: 15px;">
                    <label>Author</label><br>
                    <input type="text" id="form_author" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ddd;" required>
                </div>
                <div style="margin-bottom: 15px;">
                    <label>Genres</label><br>
                    <input type="text" id="form_genres" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ddd;" required>
                </div>
                <div style="margin-bottom: 20px;">
                    <label>Description</label><br>
                    <textarea id="form_description" rows="4" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ddd;" required></textarea>
                </div>
                <div class="modal-buttons" style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn-white" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-dark" style="background: #1a1a1a; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Save Book</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Modal Control
        function openModal() {
            document.getElementById('bookModal').style.display = 'flex';
            document.getElementById('adminBookForm').reset();
            document.getElementById('form_book_id').value = '';
            document.getElementById('modalTitle').innerText = 'Add New Book';
        }

        function closeModal() {
            document.getElementById('bookModal').style.display = 'none';
        }

        // Edit Functionality
        // Replace your old editBook function with this:
        function prepareEdit(button) {
            // 1. Read the data from the button's attributes
            const id = button.getAttribute('data-id');
            const title = button.getAttribute('data-title');
            const authors = button.getAttribute('data-authors');
            const genres = button.getAttribute('data-genres');

            // 2. Open the modal
            openModal();

            // 3. Fill the form fields with the data we just read
            document.getElementById('modalTitle').innerText = 'Edit Book';
            document.getElementById('form_book_id').value = id;
            document.getElementById('form_title').value = title;
            document.getElementById('form_author').value = authors;
            document.getElementById('form_genres').value = genres;
        }

        // Save (Add/Update) Logic
        document.getElementById('adminBookForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                book_id: document.getElementById('form_book_id').value,
                title: document.getElementById('form_title').value,
                authors: document.getElementById('form_author').value,
                genres: document.getElementById('form_genres').value,
                description: document.getElementById('form_description').value
            };

            const response = await fetch('/api/admin/book/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            if (response.ok) {
                location.reload();
            } else {
                alert("Error saving book.");
            }
        };

        // Delete Logic
        async function deleteBook(id) {
            if (confirm("Permanently delete this book from Recobook database?")) {
                const response = await fetch(`/api/admin/book/delete/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    location.reload();
                }
            }
        }

        // Quick Client-side Search Filter
        function filterBooks() {
            const input = document.getElementById('adminSearch').value.toLowerCase();
            const items = document.getElementsByClassName('admin-book-item');
            for (let item of items) {
                if (item.getAttribute('data-title').includes(input)) {
                    item.style.display = "flex";
                } else {
                    item.style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
