<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recobook - Edit Book</title>
    <link rel="stylesheet" href="admin-edit.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <div class="logo-text">Recobook</div>
        </div>

        <div class="nav-right">
            <div class="logo-badge">
                <img src="https://cdn-icons-png.flaticon.com/512/2232/2232688.png" alt="icon" width="20">
                <span>Recobook</span>
            </div>
        </div>
    </header>

    <main class="admin-container">
        <div class="admin-header-row">
            <h1 class="admin-title">Admin</h1>
            <div class="page-indicator">Edit book</div>
        </div>

        <div class="add-book-card">
            <form id="editBookForm">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" value="The Great Gatsby" required>
                </div>

                <div class="form-group">
                    <label for="genre">Genre</label>
                    <input type="text" id="genre" value="Classic Literature, Fiction, Tragedy" required>
                </div>

                <div class="form-group">
                    <label for="author">Author</label>
                    <input type="text" id="author" value="F. Scott Fitzgerald" required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="5" required>The story of the mysteriously wealthy Jay Gatsby and his love for the beautiful Daisy Buchanan. It is an exquisite tale of America in the 1920s, exploring themes of wealth, class, and the elusive American Dream.</textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-white add-submit-btn">Update</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('editBookForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Book successfully updated! AI embeddings are being recalculated.');
            window.location.href = 'admin.html';
        });
    </script>
</body>
</html>
