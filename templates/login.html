<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recobook - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>

    <header class="navbar">
        <div class="logo-text">Recobook</div>
        <div class="logo-badge">
            <img src="https://cdn-icons-png.flaticon.com/512/2232/2232688.png" alt="book icon" width="20">
            <span>Recobook</span>
        </div>
    </header>

    <main class="container">
        <h1>Recobook - Book Recommendation System <br> with AI</h1>

        <div class="login-card">
            <h2>Login</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit" class="login-btn">Login</button>
            </form>
        </div>

        <p class="footer-text">Not sign up yet? <a href="/signup_page">Sign Up</a></p>
    </main>

    <script src="{{ url_for('static', filename='auth.js') }}"></script>
</body>
</html>
